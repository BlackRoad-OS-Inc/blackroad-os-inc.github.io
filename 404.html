<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | BlackRoad OS, Inc.</title>
  <meta name="robots" content="noindex,follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --brand: #FF1D6C; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .code {
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 900;
      letter-spacing: -0.05em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, #FF1D6C 60%, #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    h1 { font-size: clamp(20px, 4vw, 28px); font-weight: 600; color: rgba(255,255,255,0.7); margin-bottom: 12px; }
    p { font-size: 16px; color: rgba(255,255,255,0.4); margin-bottom: 40px; }
    a.btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 12px;
      background: #FF1D6C; color: #fff;
      font-size: 15px; font-weight: 600;
      text-decoration: none;
      box-shadow: 0 0 30px #FF1D6C50;
      transition: all 0.2s ease;
    }
    a.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 40px #FF1D6C70; }
    a.btn:focus-visible { outline: 2px solid #FF1D6C; outline-offset: 4px; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/" class="btn">← Back to Home</a>
</body>
</html>
