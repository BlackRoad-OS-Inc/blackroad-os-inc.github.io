name: CI

on:
  push:
    branches: [main, "copilot/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Run Jest tests ──────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Job 2: Validate HTML and site structure ────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check required files exist
        run: |
          for f in index.html 404.html robots.txt sitemap.xml site.webmanifest favicon.svg .nojekyll; do
            if [ -f "$f" ]; then echo "✓ $f"; else echo "✗ $f MISSING" && exit 1; fi
          done

      - name: Validate index.html structure
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          const checks = [
            ['<!DOCTYPE html>',            'DOCTYPE declaration'],
            ['<html lang=',                'HTML lang attribute'],
            ['<meta charset=',             'charset meta'],
            ['<meta name="viewport"',      'viewport meta'],
            ['<title>',                    'title tag'],
            ['<meta name="description"',   'description meta'],
            ['BlackRoad OS',               'brand name present'],
          ];
          let failed = 0;
          checks.forEach(([str, name]) => {
            if (html.includes(str)) { console.log('✓', name); }
            else { console.error('✗', name); failed++; }
          });
          console.log(`\n${checks.length - failed}/${checks.length} checks passed`);
          if (failed > 0) process.exit(1);
          EOF

      - name: Validate sitemap.xml
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const xml = fs.readFileSync('sitemap.xml', 'utf8');
          if (!xml.includes('<urlset') || !xml.includes('<loc>')) {
            console.error('Invalid sitemap.xml'); process.exit(1);
          }
          console.log('✓ sitemap.xml valid');
          EOF

  # ── Job 3: Deploy to GitHub Pages (main branch only) ──────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [test, validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
